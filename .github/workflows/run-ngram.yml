name: Run N-Gram Experiment

on:
  workflow_dispatch:

jobs:
  run-ngram:
    runs-on: ubuntu-latest

    steps:
      - name: Get repository files
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install requirements
        run: pip install -r requirements.txt

      - name: Run n-gram comparison
        run: python ngram_comparison.py
